version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      # - npm install   # uncomment if you have a build step (React, Vue, etc.)

  pre_build:
    commands:
      - echo "Pre-build phase started on `date`"

  build:
    commands:
      - echo "Build started on `date`"
      # - npm run build   # uncomment if your site needs building (outputs to /dist or /build)

  post_build:
    commands:
      - echo "Deploying to S3..."
      - aws s3 sync . s3://stack-bucket-cicd --delete --exclude ".git/*" --exclude "buildspec.yml"
      - echo "Deployment completed on `date`"

artifacts:
  files:
    - '**/*'
  base-directory: .
